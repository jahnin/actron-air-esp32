    auto_mode:
      id: auto_mode
      name: "Auto"
      icon: mdi:flash-auto
    heat:
      id: heat
      name: "Heat"
      icon: mdi:fire
    run:
      id: run
      name: "Run"
      icon: mdi:run
    timer:
      id: timer
      name: "Timer"
    inside:
      id: inside
      name: "Inside"
    zone_1:
      id: zone_1
      name: "Zone 1"
    zone_2:
      id: zone_2
      name: "Zone 2"
    zone_3:
      id: zone_3
      name: "Zone 3"
    zone_4:
