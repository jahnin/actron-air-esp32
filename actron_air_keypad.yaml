wifi:
  ssid: "zion-iot"
  password: "W@YB@3K2Z10N"
  use_address: 172.16.30.71

        
substitutions:
  gpio_keypad_pin: "GPIO4"
  gpio_i2c_sda: "GPIO10"
  gpio_i2c_scl: "GPIO3"

  voltage_power: "5000"
  
  # Keypad fan: 3221
  voltage_fan: "725.0"

  # Keypad mode: 450
  voltage_mode: "936.0"
  
  # Keypad_temp_up: 1504
  voltage_temp_up: "857"

  #Keypad_temp_down: 2864
  voltage_temp_down: "756.0"

  # Keypad_timer: 1848
  voltage_timer: "827.5"

  # Keypad_timer_up: 2227
  voltage_timer_up: "796.0"

  # Keypad_timer_down: 2523
  voltage_timer_down: "776.0"

  # Keypad_zone_1: 3551
  voltage_zone_1: "699.0"

  # Keypad_zone_2: 4223
  voltage_zone_2: "641.0"

  # Keypad_zone_3: 3863
  voltage_zone_3: "667.0"

  # Keypad_zone_4: 4664
  voltage_zone_4: "605.0"

  # Keypad_zone_5: 650
  voltage_zone_5: "913.0"

  board: "esp32-c3-devkitm-1"
  variant: "ESP32C3"
  framework: "arduino"
  version: "latest"
  # log level - WARN ERROR DEBUG VERBOSE
  log_level: "WARN"
  dac_output_address: "0x60"

esphome:
  name: "actron"
  friendly_name: Actron Wifi
  platformio_options:
    board_build.flash_mode: dio
  # Disable power-on on boot.
  on_boot:
    priority: -100  # Run after everything else initialises
    then:
      - lambda: |-
          id(boot_complete) = true;

esp32:
  board: ${board}
  variant: ${variant}
  framework:
    type: ${framework}
    version: ${version}

external_components:
  - source:
      type: local
      path: components
    components: [actron_air_esphome]

logger:
  level: ${log_level}
api:

ota:
  - platform: esphome

captive_portal:

web_server:
  port: 80

# I2C bus for MCP4725 DAC
i2c:
  sda: ${gpio_i2c_sda}
  scl: ${gpio_i2c_scl}
  scan: True

# MCP4725 output to send voltages for key presses
output:
  - platform: mcp4725
    id: dac_output
    address: ${dac_output_address}

globals:
  - id: dac_value
    type: double
  - id: prev_fan
    type: std::string
    initial_value: '"Unset"'
  - id: boot_complete   # Disable power-on on boot
    type: bool
    initial_value: 'false'

# DAC output control for testing
number:
  - platform: template
    name: "DAC Output milliVolts"
    icon: mdi:flash-triangle
    min_value: 0
    max_value: 5000
    step: 0.1
    optimistic: true
    on_value:
      then:
        lambda: |-
          id(dac_output).set_level((x / 5000.0));

# Button controls
button:
  - platform: template
    name: "Press"
    id: press_button
    internal: true
    icon: mdi:power
    on_press:
      - logger.log: Button Pressed
      - lambda: |-
          if (!id(boot_complete)) {
            ESP_LOGW("actron", "Ignoring button press during boot");
            return;
          }
          id(dac_output).set_level((id(dac_value) / 5000.0));
      - delay: 500ms
      - lambda: |-
          id(dac_output).set_level((0.0 / 5000.0));
      - delay: 500ms

  - platform: template
    name: "Fan"
    icon: mdi:fan
    on_press:
      - lambda: |-
          id(dac_value)=${voltage_fan};
          id(press_button).press();

  - platform: template
    name: "Mode"
    icon: mdi:air-conditioner
    on_press:
      - lambda: |-
          id(dac_value)=${voltage_mode};
          id(press_button).press();

  - platform: template
    name: "Temp Up"
    icon: mdi:thermometer-plus
    on_press:
      - lambda: |-
          id(dac_value)=${voltage_temp_up};
          id(press_button).press();

  - platform: template
    name: "Temp Down"
    icon: mdi:thermometer-minus
    on_press:
      - lambda: |-
          id(dac_value)=${voltage_temp_down};
          id(press_button).press();

  - platform: template
    name: "Timer"
    icon: mdi:timer
    on_press:
      - lambda: |-
          id(dac_value)=${voltage_timer};
          id(press_button).press();

  - platform: template
    name: "Timer Up"
    icon: mdi:timer-plus
    on_press:
      - lambda: |-
          id(dac_value)=${voltage_timer_up};
          id(press_button).press();

  - platform: template
    name: "Timer Down"
    icon: mdi:timer-minus
    on_press:
      - lambda: |-
          id(dac_value)=${voltage_timer_down};
          id(press_button).press();

# Power and zone control switches
switch:
  - platform: template
    icon: mdi:power
    id: power
    name: "Power"
    turn_on_action:
      - lambda: |-
          id(dac_value)=${voltage_power};
          id(press_button).press();
    turn_off_action:
      - lambda: |-
          id(dac_value)=${voltage_power};
          id(press_button).press();
    lambda: |-
      return (id(cool).state or id(auto_mode).state or id(heat).state or id(fan_cont).state or id(fan_high).state or id(fan_mid).state or id(fan_low).state);

  - platform: template
    id: zone_1_switch
    name: "Zone 1"
    icon: mdi:air-conditioner
    turn_on_action:
      - lambda: |-
          id(dac_value)=${voltage_zone_1};
          id(press_button).press();
    turn_off_action:
      - lambda: |-
          id(dac_value)=${voltage_zone_1};
          id(press_button).press();
    lambda: return id(zone_1).state;

  - platform: template
    id: zone_2_switch
    name: "Zone 2"
    icon: mdi:air-conditioner
    turn_on_action:
      - lambda: |-
          id(dac_value)=${voltage_zone_2};
          id(press_button).press();
    turn_off_action:
      - lambda: |-
          id(dac_value)=${voltage_zone_2};
          id(press_button).press();
    lambda: return id(zone_2).state;

  - platform: template
    id: zone_3_switch
    name: "Zone 3"
    icon: mdi:air-conditioner
    turn_on_action:
      - lambda: |-
          id(dac_value)=${voltage_zone_3};
          id(press_button).press();
    turn_off_action:
      - lambda: |-
          id(dac_value)=${voltage_zone_3};
          id(press_button).press();
    lambda: return id(zone_3).state;

  - platform: template
    id: zone_4_switch
    name: "Zone 4"
    icon: mdi:air-conditioner
    turn_on_action:
      - lambda: |-
          id(dac_value)=${voltage_zone_4};
          id(press_button).press();
    turn_off_action:
      - lambda: |-
          id(dac_value)=${voltage_zone_4};
          id(press_button).press();
    lambda: return id(zone_4).state;

  - platform: template
    id: zone_5_switch
    name: "Zone 5"
    icon: mdi:air-conditioner
    turn_on_action:
      - lambda: |-
          id(dac_value)=${voltage_zone_5};
          id(press_button).press();
    turn_off_action:
      - lambda: |-
          id(dac_value)=${voltage_zone_5};
          id(press_button).press();
    lambda: return id(zone_5).state;

actron_air_esphome:
  id: actron_air_esphome_1
  pin: ${gpio_keypad_pin}

# Sensors from keypad status component
sensor:
  - platform: actron_air_esphome
    setpoint_temp:
      name: "Setpoint Temperature"
      id: setpoint_temp
      icon: mdi:thermometer
    error_count:
      name: "Error Count"
      id: error_count

text_sensor:
  - platform: actron_air_esphome
    bit_string:
      name: "Bit String"
      id: bit_string
      internal: false

  - platform: template
    name: "Fan Mode"
    update_interval: 1s
    lambda: |-
      std::string current_fan = "";
      if (id(fan_high).state and !id(fan_cont).state) {
        current_fan="High";
      } else if (id(fan_mid).state and !id(fan_cont).state) {
        current_fan="Medium";
      } else if (id(fan_low).state and !id(fan_cont).state) {
        current_fan="Low";
      } else if (id(fan_high).state and id(fan_cont).state) {
        current_fan="High Cont";
      } else if (id(fan_mid).state and id(fan_cont).state) {
        current_fan="Medium Cont";
      } else if (id(fan_low).state and id(fan_cont).state) {
        current_fan="Low Cont";
      } else {
        current_fan="Off";
      }
      if (current_fan.compare(id(prev_fan)) != 0) {
        id(prev_fan) = current_fan;
        return {current_fan};
      }
      return {};

binary_sensor:
  - platform: actron_air_esphome
    fan_cont:
      id: fan_cont
