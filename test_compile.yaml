# Minimal ESPHome config for testing the component compiles correctly
# Usage: ./setup-dev.sh && .venv/bin/esphome compile test_compile.yaml

esphome:
  name: test-compile
  friendly_name: Test Compile

esp32:
  variant: esp32
  framework:
    type: esp-idf

logger:

external_components:
  - source:
      type: local
      path: components

actron_air_esphome:
  id: actron_air_esphome_1
  pin: GPIO32

sensor:
  - platform: actron_air_esphome
    setpoint_temp:
      name: "Setpoint Temperature"
    error_count:
      name: "Error Count"

text_sensor:
  - platform: actron_air_esphome
    bit_string:
      name: "Bit String"

binary_sensor:
  - platform: actron_air_esphome
    fan_cont:
      name: "Fan Cont"
    fan_high:
      name: "Fan High"
    fan_mid:
      name: "Fan Mid"
    fan_low:
      name: "Fan Low"
    cool:
      name: "Cool"
    auto_mode:
      name: "Auto"
    heat:
      name: "Heat"
    run:
      name: "Run"
    timer:
      name: "Timer"
    inside:
      name: "Inside"
    zone_1:
      name: "Zone 1"
    zone_2:
      name: "Zone 2"
    zone_3:
      name: "Zone 3"
    zone_4:
      name: "Zone 4"
    zone_5:
      name: "Zone 5"
    zone_6:
      name: "Zone 6"
    zone_7:
      name: "Zone 7"
    zone_8:
      name: "Zone 8"
