# Minimal Home Assistant config for testing Actron Air ESPHome card
homeassistant:
  name: Home
  unit_system: metric
  temperature_unit: C
  time_zone: Australia/Sydney

# Enable frontend
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  resource_mode: yaml
  resources:
    - url: http://127.0.0.1:5173/src/index.ts
      type: module
  dashboards:
    lovelace:
      mode: yaml
      filename: ui-lovelace.yaml
      title: Actron Air
      icon: mdi:fish
      show_in_sidebar: true

# Enables configuration UI
config:

# Enable developer tools
logger:
  default: info

# Input helpers for controlling mock state
input_number:
  actron_air_esphome_setpoint:
    name: Actron Setpoint Temperature
    min: 16
    max: 30
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer

input_boolean:
  # Power
  actron_air_esphome_power:
    name: Actron Power
    icon: mdi:power

  # Mode indicators (mutually exclusive in real system)
  actron_air_esphome_cool:
    name: Actron Cool Mode
    icon: mdi:snowflake
  actron_air_esphome_heat:
    name: Actron Heat Mode
    icon: mdi:fire
  actron_air_esphome_auto_mode:
    name: Actron Auto Mode
    icon: mdi:autorenew

  # Run state
  actron_air_esphome_run:
    name: Actron Running
    icon: mdi:fan

  # Fan speed indicators (mutually exclusive)
  actron_air_esphome_fan_low:
    name: Actron Fan Low
    icon: mdi:fan-speed-1
  actron_air_esphome_fan_mid:
    name: Actron Fan Medium
    icon: mdi:fan-speed-2
  actron_air_esphome_fan_high:
    name: Actron Fan High
    icon: mdi:fan-speed-3
  actron_air_esphome_fan_cont:
    name: Actron Fan Continuous
    icon: mdi:fan-auto

  # Timer and room sensor
  actron_air_esphome_timer:
    name: Actron Timer
    icon: mdi:timer
  actron_air_esphome_inside:
    name: Actron Room Sensor
    icon: mdi:home-thermometer

  # Zones
  actron_air_esphome_zone_1:
    name: Zone 1
    icon: mdi:numeric-1-box
  actron_air_esphome_zone_2:
    name: Zone 2
    icon: mdi:numeric-2-box
  actron_air_esphome_zone_3:
    name: Zone 3
    icon: mdi:numeric-3-box
  actron_air_esphome_zone_4:
    name: Zone 4
    icon: mdi:numeric-4-box
  actron_air_esphome_zone_5:
    name: Zone 5
    icon: mdi:numeric-5-box
  actron_air_esphome_zone_6:
    name: Zone 6
    icon: mdi:numeric-6-box
  actron_air_esphome_zone_7:
    name: Zone 7
    icon: mdi:numeric-7-box

# Template entities that the card reads
template:
  # Setpoint temperature sensor (card reads this)
  - sensor:
      - name: Actron Air ESPHome Setpoint Temperature
        unique_id: actron_air_esphome_setpoint_temperature
        unit_of_measurement: "°C"
        device_class: temperature
        state: "{{ states('input_number.actron_air_esphome_setpoint') }}"

  # Binary sensors for mode and status indicators
  - binary_sensor:
      - name: Actron Air ESPHome Cool
        unique_id: actron_air_esphome_cool
        state: "{{ is_state('input_boolean.actron_air_esphome_cool', 'on') }}"

      - name: Actron Air ESPHome Heat
        unique_id: actron_air_esphome_heat
        state: "{{ is_state('input_boolean.actron_air_esphome_heat', 'on') }}"

      - name: Actron Air ESPHome Auto Mode
        unique_id: actron_air_esphome_auto_mode
        state: "{{ is_state('input_boolean.actron_air_esphome_auto_mode', 'on') }}"

      - name: Actron Air ESPHome Run
        unique_id: actron_air_esphome_run
        state: "{{ is_state('input_boolean.actron_air_esphome_run', 'on') }}"

      - name: Actron Air ESPHome Fan Low
        unique_id: actron_air_esphome_fan_low
        state: "{{ is_state('input_boolean.actron_air_esphome_fan_low', 'on') }}"

      - name: Actron Air ESPHome Fan Mid
        unique_id: actron_air_esphome_fan_mid
        state: "{{ is_state('input_boolean.actron_air_esphome_fan_mid', 'on') }}"

      - name: Actron Air ESPHome Fan High
        unique_id: actron_air_esphome_fan_high
        state: "{{ is_state('input_boolean.actron_air_esphome_fan_high', 'on') }}"

      - name: Actron Air ESPHome Fan Cont
        unique_id: actron_air_esphome_fan_cont
        state: "{{ is_state('input_boolean.actron_air_esphome_fan_cont', 'on') }}"

      - name: Actron Air ESPHome Timer
        unique_id: actron_air_esphome_timer
        state: "{{ is_state('input_boolean.actron_air_esphome_timer', 'on') }}"

      - name: Actron Air ESPHome Inside
        unique_id: actron_air_esphome_inside
        state: "{{ is_state('input_boolean.actron_air_esphome_inside', 'on') }}"

      # Zone binary sensors
      - name: Actron Air ESPHome Zone 1
        unique_id: actron_air_esphome_zone_1
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_1', 'on') }}"

      - name: Actron Air ESPHome Zone 2
        unique_id: actron_air_esphome_zone_2
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_2', 'on') }}"

      - name: Actron Air ESPHome Zone 3
        unique_id: actron_air_esphome_zone_3
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_3', 'on') }}"

      - name: Actron Air ESPHome Zone 4
        unique_id: actron_air_esphome_zone_4
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_4', 'on') }}"

      - name: Actron Air ESPHome Zone 5
        unique_id: actron_air_esphome_zone_5
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_5', 'on') }}"

      - name: Actron Air ESPHome Zone 6
        unique_id: actron_air_esphome_zone_6
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_6', 'on') }}"

      - name: Actron Air ESPHome Zone 7
        unique_id: actron_air_esphome_zone_7
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_7', 'on') }}"

  # Switches (modern template syntax)
  - switch:
      - name: Actron Air ESPHome Power
        unique_id: actron_air_esphome_power
        state: "{{ is_state('input_boolean.actron_air_esphome_power', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.actron_air_esphome_power
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.actron_air_esphome_power

      - name: Actron Air ESPHome Zone 1
        unique_id: actron_air_esphome_zone_1_switch
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_1', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.actron_air_esphome_zone_1
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.actron_air_esphome_zone_1

      - name: Actron Air ESPHome Zone 2
        unique_id: actron_air_esphome_zone_2_switch
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_2', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.actron_air_esphome_zone_2
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.actron_air_esphome_zone_2

      - name: Actron Air ESPHome Zone 3
        unique_id: actron_air_esphome_zone_3_switch
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_3', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.actron_air_esphome_zone_3
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.actron_air_esphome_zone_3

      - name: Actron Air ESPHome Zone 4
        unique_id: actron_air_esphome_zone_4_switch
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_4', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.actron_air_esphome_zone_4
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.actron_air_esphome_zone_4

      - name: Actron Air ESPHome Zone 5
        unique_id: actron_air_esphome_zone_5_switch
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_5', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.actron_air_esphome_zone_5
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.actron_air_esphome_zone_5

      - name: Actron Air ESPHome Zone 6
        unique_id: actron_air_esphome_zone_6_switch
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_6', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.actron_air_esphome_zone_6
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.actron_air_esphome_zone_6

      - name: Actron Air ESPHome Zone 7
        unique_id: actron_air_esphome_zone_7_switch
        state: "{{ is_state('input_boolean.actron_air_esphome_zone_7', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.actron_air_esphome_zone_7
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.actron_air_esphome_zone_7

# Button entities for control actions
button:
  # Mode button
  - platform: template
    buttons:
      actron_air_esphome_mode:
        friendly_name: Actron Air ESPHome Mode
        unique_id: actron_air_esphome_mode
        icon: mdi:autorenew
        press:
          - service: system_log.write
            data:
              message: "Mode button pressed"
              level: info

      # Fan button
      actron_air_esphome_fan:
        friendly_name: Actron Air ESPHome Fan
        unique_id: actron_air_esphome_fan
        icon: mdi:fan
        press:
          - service: system_log.write
            data:
              message: "Fan button pressed"
              level: info

      # Temperature buttons
      actron_air_esphome_temp_up:
        friendly_name: Actron Air ESPHome Temp Up
        unique_id: actron_air_esphome_temp_up
        icon: mdi:thermometer-plus
        press:
          - service: input_number.increment
            target:
              entity_id: input_number.actron_air_esphome_setpoint

      actron_air_esphome_temp_down:
        friendly_name: Actron Air ESPHome Temp Down
        unique_id: actron_air_esphome_temp_down
        icon: mdi:thermometer-minus
        press:
          - service: input_number.decrement
            target:
              entity_id: input_number.actron_air_esphome_setpoint

      # Timer buttons
      actron_air_esphome_timer:
        friendly_name: Actron Air ESPHome Timer
        unique_id: actron_air_esphome_timer_button
        icon: mdi:timer
        press:
          - service: input_boolean.toggle
            target:
              entity_id: input_boolean.actron_air_esphome_timer

      actron_air_esphome_timer_up:
        friendly_name: Actron Air ESPHome Timer Up
        unique_id: actron_air_esphome_timer_up
        icon: mdi:timer-plus
        press:
          - service: system_log.write
            data:
              message: "Timer up button pressed"
              level: info

      actron_air_esphome_timer_down:
        friendly_name: Actron Air ESPHome Timer Down
        unique_id: actron_air_esphome_timer_down
        icon: mdi:timer-minus
        press:
          - service: system_log.write
            data:
              message: "Timer down button pressed"
              level: info
